<!-- ページ種別: 個別ニュース記事。JSON-LDはNewsArticle -->
<article class="news-article">
  <nav class="breadcrumb">{{BREADCRUMB}}</nav>
  <h1>{{TITLE}}</h1>
  <p class="meta">公開: {{PUBLISHED}} / 更新: {{UPDATED}} / カテゴリ: {{CATEGORY}}</p>
  <div class="summary">{{SUMMARY}}</div>
  <p class="source">出典: <a href="{{SOURCE_URL}}" rel="nofollow noopener" target="_blank">一次ソースを見る</a></p>
  <aside class="related-cards">
    <h2>関連するクレカ<span class="pr-tag">PR</span></h2>
    <!-- {{RELATED_CARDS}} -->
  </aside>
</article>
